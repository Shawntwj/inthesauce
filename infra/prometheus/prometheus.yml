global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Go trade service (once built)
  - job_name: trade-service
    static_configs:
      - targets: [trade-service:8080]
    metrics_path: /metrics

  # ClickHouse built-in metrics endpoint
  - job_name: clickhouse
    static_configs:
      - targets: [clickhouse:8123]
    metrics_path: /metrics

  # Kafka via JMX exporter (add later — stub for now)
  # - job_name: kafka
  #   static_configs:
  #     - targets: [kafka:9308]
