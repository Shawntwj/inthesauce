apiVersion: 1

datasources:
  # ── Prometheus ──────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: false
    jsonData:
      httpMethod: POST

  # ── ClickHouse ───────────────────────────────────────────────
  # Requires GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    url: http://clickhouse:8123
    access: proxy
    isDefault: true
    jsonData:
      defaultDatabase: etrm
      username: default
      port: 8123
      protocol: http
    secureJsonData:
      password: ""

  # ── MSSQL (Azure SQL Edge) ───────────────────────────────────
  - name: MSSQL
    type: mssql
    uid: mssql
    url: mssql:1433
    access: proxy
    database: etrm
    user: sa
    secureJsonData:
      password: "YourStr0ng!Pass"
    jsonData:
      encrypt: disable
      authenticationType: SQL Server Authentication
