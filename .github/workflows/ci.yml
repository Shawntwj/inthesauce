name: ETRM Sandbox CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-infrastructure:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose syntax
        run: docker compose config --quiet

      - name: Check SQL scripts have no syntax red flags
        run: |
          echo "=== Checking SQL files for common issues ==="
          # Check for dangerous operations that shouldn't be in init scripts
          for f in scripts/*.sql; do
            echo "Checking $f..."
            if grep -iE 'DROP\s+DATABASE|TRUNCATE\s+TABLE' "$f"; then
              echo "ERROR: $f contains destructive operations (DROP DATABASE / TRUNCATE TABLE)"
              exit 1
            fi
          done
          echo "SQL scripts look clean."

      - name: Validate Prometheus config
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml" \
            prom/prometheus:v2.49.0 \
            promtool check config /etc/prometheus/prometheus.yml

      - name: Validate Grafana datasources YAML
        run: |
          python3 -c "
          import yaml, sys
          for f in ['infra/grafana/provisioning/datasources/datasources.yml',
                     'infra/grafana/provisioning/dashboards/dashboards.yml']:
              try:
                  with open(f) as fh:
                      yaml.safe_load(fh)
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'ERROR: {f}: {e}')
                  sys.exit(1)
          "

      - name: Validate Grafana dashboard JSON
        run: |
          python3 -c "
          import json, glob, sys
          for f in glob.glob('infra/grafana/dashboards/*.json'):
              try:
                  with open(f) as fh:
                      d = json.load(fh)
                  assert 'panels' in d, 'missing panels key'
                  assert 'title' in d, 'missing title key'
                  print(f'OK: {f} ({len(d[\"panels\"])} panels)')
              except Exception as e:
                  print(f'ERROR: {f}: {e}')
                  sys.exit(1)
          "

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Format Check
        working-directory: infra/terraform
        run: terraform fmt -check -diff

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

  validate-go:
    name: Validate Go Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build trade-service
        working-directory: services/trade-service
        run: go build ./...

      - name: Test trade-service
        working-directory: services/trade-service
        run: go test ./... -v -count=1

      - name: Vet trade-service
        working-directory: services/trade-service
        run: go vet ./...

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [validate-infrastructure, validate-terraform, validate-go]
    steps:
      - uses: actions/checkout@v4

      - name: Build trade-service image
        run: docker build -t etrm-trade-service:ci services/trade-service/

      - name: Verify image runs
        run: |
          docker run --rm -d --name trade-service-test \
            -e MSSQL_HOST=localhost \
            -e CLICKHOUSE_HOST=localhost \
            -e KAFKA_BROKERS=localhost:9092 \
            -p 8080:8080 \
            etrm-trade-service:ci || true
          sleep 2
          docker logs trade-service-test 2>&1 || true
          docker stop trade-service-test 2>/dev/null || true
          echo "Image builds and starts successfully"

      # In production, you would push to ECR here:
      # - name: Push to ECR
      #   run: echo "MOCK — would push etrm-trade-service:${{ github.sha }} to ECR"

      # In production, you would trigger ArgoCD sync here:
      # - name: Deploy via ArgoCD
      #   run: echo "MOCK — would trigger ArgoCD sync for etrm namespace"
